services:
  nepseapi:
    image: surajrimal/nepseapi:latest
    container_name: nepseapi
    ports:
      - "8000:8000" # REST API
      - "5555:5555" # WebSocket server
      - "8080:8080" # MCP server
    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import http.client; conn = http.client.HTTPConnection('localhost:8000'); conn.request('GET', '/health'); r = conn.getresponse(); exit(0 if r.status == 200 else 1)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arthabodh_app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres_db
      POSTGRES_HOST_FALLBACKS: db,postgres_db,localhost,127.0.0.1
      DB_INIT_FAIL_HARD: false
      DB_INIT_MAX_ATTEMPTS: 20
      DB_INIT_RETRY_SECONDS: 2
      POSTGRES_PORT: 5432
      NEPSE_PRICE_VOLUME_URL_TEMPLATE: "http://nepseapi:8000/PriceVolumeHistory?symbol={symbol}"
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      nepseapi:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
